<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý việc nhà</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bg-shapes span {
            position: absolute;
            border-radius: 50%;
            opacity: 0.07;
            animation: floatUp linear infinite;
        }

        .bg-shapes span:nth-child(1) {
            width: 80px; height: 80px;
            background: #ff6b6b;
            left: 10%; bottom: -80px;
            animation-duration: 18s;
            animation-delay: 0s;
        }
        .bg-shapes span:nth-child(2) {
            width: 60px; height: 60px;
            background: #00c9ff;
            left: 30%; bottom: -60px;
            animation-duration: 22s;
            animation-delay: 3s;
        }
        .bg-shapes span:nth-child(3) {
            width: 120px; height: 120px;
            background: #92fe9d;
            left: 55%; bottom: -120px;
            animation-duration: 25s;
            animation-delay: 1s;
        }
        .bg-shapes span:nth-child(4) {
            width: 50px; height: 50px;
            background: #ffd93d;
            left: 75%; bottom: -50px;
            animation-duration: 20s;
            animation-delay: 5s;
        }
        .bg-shapes span:nth-child(5) {
            width: 100px; height: 100px;
            background: #c084fc;
            left: 90%; bottom: -100px;
            animation-duration: 28s;
            animation-delay: 2s;
        }
        .bg-shapes span:nth-child(6) {
            width: 70px; height: 70px;
            background: #fb7185;
            left: 45%; bottom: -70px;
            animation-duration: 16s;
            animation-delay: 7s;
        }
        .bg-shapes span:nth-child(7) {
            width: 90px; height: 90px;
            background: #38bdf8;
            left: 5%; bottom: -90px;
            animation-duration: 24s;
            animation-delay: 4s;
        }
        .bg-shapes span:nth-child(8) {
            width: 40px; height: 40px;
            background: #fbbf24;
            left: 65%; bottom: -40px;
            animation-duration: 19s;
            animation-delay: 6s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.07;
            }
            90% {
                opacity: 0.07;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
        }

        .progress-text {
            color: white;
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            height: 14px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00c9ff, #92fe9d);
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .add-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-section input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .add-section input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .add-section input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .add-section button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: #ff6b6b;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            white-space: nowrap;
        }

        .add-section button:hover {
            background: #ee5a5a;
            transform: translateY(-1px);
        }

        .add-section button:active {
            transform: translateY(0);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-tabs button {
            padding: 8px 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            background: transparent;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tabs button.active {
            background: white;
            color: #764ba2;
            border-color: white;
            font-weight: 600;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px 18px;
            border-radius: 14px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, opacity 0.3s, box-shadow 0.2s, background 0.2s;
            animation: slideIn 0.3s ease;
            user-select: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .task-item.dragging {
            opacity: 0.4;
            transform: scale(0.98);
        }

        .task-item.drag-over {
            border-top: 3px solid #667eea;
            margin-top: -3px;
        }

        .drag-handle {
            cursor: grab;
            color: rgba(255, 255, 255, 0.25);
            font-size: 1.2rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .drag-handle:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .task-item.done {
            opacity: 0.6;
        }

        .task-item.done .task-name {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.3);
        }

        .checkbox-wrapper {
            position: relative;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        .checkbox-wrapper input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .checkmark {
            width: 26px;
            height: 26px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox-wrapper input:checked + .checkmark {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        .checkmark::after {
            content: '';
            width: 7px;
            height: 12px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s;
        }

        .checkbox-wrapper input:checked + .checkmark::after {
            transform: rotate(45deg) scale(1);
        }

        .task-name {
            flex: 1;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-word;
        }

        .task-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .task-status.in-progress {
            background: #fff3e0;
            color: #f57c00;
        }

        .task-status.completed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .task-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 40px 20px;
            font-size: 1.1rem;
        }

        .clear-done {
            display: none;
            margin-top: 16px;
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            background: transparent;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .clear-done:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .clear-done.visible {
            display: block;
        }

        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 40px 20px;
            font-size: 1.1rem;
        }

        .sync-status {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            margin-top: 16px;
        }

        /* ===== CHAT ===== */
        .chat-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: 3px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 6px 30px rgba(255, 107, 107, 0.6);
            z-index: 9999;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-toggle:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 35px rgba(255, 107, 107, 0.8);
        }

        .chat-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .chat-badge.visible {
            display: flex;
        }

        .chat-panel {
            position: fixed;
            bottom: 92px;
            right: 24px;
            width: 340px;
            max-height: 480px;
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            backdrop-filter: blur(30px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 9998;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: chatSlideUp 0.3s ease;
        }

        .chat-panel.open {
            display: flex;
        }

        @keyframes chatSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .chat-header .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            min-height: 200px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .chat-msg-wrapper {
            max-width: 85%;
            display: flex;
            flex-direction: column;
        }

        .chat-msg-wrapper.other {
            align-self: flex-start;
        }

        .chat-msg-wrapper.mine {
            align-self: flex-end;
        }

        .msg-author {
            font-size: 0.68rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            padding: 0 6px;
        }

        .chat-msg-wrapper.mine .msg-author {
            text-align: right;
            color: rgba(167, 139, 250, 0.8);
        }

        .chat-msg-wrapper.other .msg-author {
            color: rgba(96, 165, 250, 0.8);
        }

        .chat-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-msg-wrapper.other .chat-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border-top-left-radius: 4px;
        }

        .chat-msg-wrapper.mine .chat-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-top-right-radius: 4px;
        }

        .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-msg-wrapper.mine .msg-time {
            text-align: right;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .chat-input-area input:focus {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .chat-send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .chat-send-btn:hover {
            transform: scale(1.1);
        }

        .chat-name-prompt {
            padding: 24px 18px;
            text-align: center;
        }

        .chat-name-prompt p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .chat-name-prompt input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
            margin-bottom: 10px;
        }

        .chat-name-prompt button {
            padding: 10px 28px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            padding: 40px 20px;
        }

        @media (max-width: 400px) {
            .chat-panel {
                right: 8px;
                left: 8px;
                width: auto;
                bottom: 88px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>
    <div class="container">
        <header>
            <h1>Quản lý việc nhà</h1>
            <p>Theo dõi tiến trình hoàn thành công việc</p>
        </header>

        <div class="progress-section">
            <div class="progress-text">
                <span id="progress-label">0 / 0 hoàn thành</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="add-section">
            <input type="text" id="task-input" placeholder="Thêm công việc mới..." autofocus>
            <button onclick="addTask()">Thêm</button>
        </div>

        <div class="filter-tabs">
            <button class="active" onclick="setFilter('all', this)">Tất cả</button>
            <button onclick="setFilter('pending', this)">Chưa xong</button>
            <button onclick="setFilter('done', this)">Đã xong</button>
        </div>

        <div class="task-list" id="task-list">
            <div class="loading">Đang tải dữ liệu...</div>
        </div>

        <button class="clear-done" id="clear-done" onclick="clearDone()">Xóa các việc đã hoàn thành</button>

        <div class="sync-status" id="sync-status"></div>
    </div>

    <!-- Chat -->
    <button class="chat-toggle" id="chat-toggle-btn" onclick="toggleChat()" title="Nhắn tin">
        &#128172;
        <span class="chat-badge" id="chat-badge"></span>
    </button>

    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">
            <h3><span class="online-dot"></span>Nhắn tin nhóm</h3>
        </div>
        <div id="chat-body">
            <!-- Name prompt or messages will go here -->
        </div>
    </div>

    <script>
        // ========== CẤU HÌNH JSONBIN ==========
        const JSONBIN_KEY = '$2a$10$N.17TNBDmRXgfwSBSGf4nuvK.szun57XY2SQjhpS5yLa054orS5ae';
        const BIN_ID = '69c79236c3097a1dd56be797';
        // ======================================

        const API_URL = 'https://api.jsonbin.io/v3/b';
        let tasks = [];
        let currentFilter = 'all';
        let saveTimeout = null;

        function showSync(msg) {
            document.getElementById('sync-status').textContent = msg;
        }

        async function initBin() {
            await loadTasks(true);
        }

        // Đọc dữ liệu từ JSONBin (chỉ render khi dữ liệu thay đổi)
        let lastTasksHash = '';
        async function loadTasks(forceRender) {
            try {
                const res = await fetch(`${API_URL}/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_KEY }
                });
                const data = await res.json();
                const record = data.record;
                const newTasks = record && record.tasks ? record.tasks : (Array.isArray(record) ? record : []);
                const newHash = JSON.stringify(newTasks);
                if (forceRender || newHash !== lastTasksHash) {
                    tasks = newTasks;
                    lastTasksHash = newHash;
                    render();
                }
                showSync('Đã đồng bộ lúc ' + new Date().toLocaleTimeString('vi-VN'));
            } catch (err) {
                if (forceRender) {
                    tasks = [];
                    render();
                }
                showSync('Lỗi tải dữ liệu.');
            }
        }

        // Lưu dữ liệu lên JSONBin (có debounce để tránh gọi API quá nhiều)
        function save() {
            // Render ngay trên giao diện
            render();
            lastTasksHash = JSON.stringify(tasks);
            // Debounce: đợi 500ms rồi mới gửi lên server
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                showSync('Đang lưu...');
                try {
                    await fetch(`${API_URL}/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_KEY
                        },
                        body: JSON.stringify({ tasks: tasks })
                    });
                    showSync('Đã lưu lúc ' + new Date().toLocaleTimeString('vi-VN'));
                } catch (err) {
                    showSync('Lỗi lưu dữ liệu. Thử lại...');
                }
            }, 500);
        }

        // Tự động tải lại dữ liệu mỗi 30 giây
        setInterval(() => {
            if (BIN_ID) loadTasks();
        }, 30000);

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}`;
        }

        function updateProgress() {
            const total = tasks.length;
            const done = tasks.filter(t => t.done).length;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);

            document.getElementById('progress-label').textContent = `${done} / ${total} hoàn thành`;
            document.getElementById('progress-percent').textContent = `${percent}%`;
            document.getElementById('progress-fill').style.width = `${percent}%`;

            const clearBtn = document.getElementById('clear-done');
            clearBtn.classList.toggle('visible', done > 0);
        }

        function render() {
            const list = document.getElementById('task-list');
            const filtered = tasks.filter(t => {
                if (currentFilter === 'pending') return !t.done;
                if (currentFilter === 'done') return t.done;
                return true;
            });

            if (filtered.length === 0) {
                const messages = {
                    all: 'Chưa có công việc nào. Hãy thêm việc mới!',
                    pending: 'Tuyệt vời! Đã hoàn thành tất cả!',
                    done: 'Chưa có việc nào được hoàn thành.'
                };
                list.innerHTML = `<div class="empty-state">${messages[currentFilter]}</div>`;
            } else {
                list.innerHTML = filtered.map(task => `
                    <div class="task-item ${task.done ? 'done' : ''}" draggable="true" data-id="${task.id}">
                        <span class="drag-handle" title="Kéo để di chuyển">&#9776;</span>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}')">
                            <span class="checkmark"></span>
                        </label>
                        <span class="task-name">${escapeHtml(task.name)}</span>
                        <span class="task-status ${task.done ? 'completed' : 'in-progress'}">${task.done ? 'Hoàn thành' : 'Đang làm'}</span>
                        <span class="task-date">${formatDate(task.createdAt)}</span>
                        <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Xóa">&times;</button>
                    </div>
                `).join('');
                initDragAndDrop();
            }

            updateProgress();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const name = input.value.trim();
            if (!name) return;

            tasks.unshift({
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                name: name,
                done: false,
                createdAt: Date.now()
            });

            input.value = '';
            input.focus();
            save();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                save();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        function clearDone() {
            tasks = tasks.filter(t => !t.done);
            save();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        let draggedId = null;

        function initDragAndDrop() {
            const items = document.querySelectorAll('.task-item[draggable]');
            items.forEach(item => {
                item.addEventListener('dragstart', e => {
                    draggedId = item.dataset.id;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                    draggedId = null;
                });

                item.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (item.dataset.id !== draggedId) {
                        item.classList.add('drag-over');
                    }
                });

                item.addEventListener('dragleave', () => {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', e => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    const targetId = item.dataset.id;
                    if (draggedId && draggedId !== targetId) {
                        const fromIndex = tasks.findIndex(t => t.id === draggedId);
                        const toIndex = tasks.findIndex(t => t.id === targetId);
                        if (fromIndex !== -1 && toIndex !== -1) {
                            const [moved] = tasks.splice(fromIndex, 1);
                            tasks.splice(toIndex, 0, moved);
                            save();
                        }
                    }
                });
            });
        }

        document.getElementById('task-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        // ========== CHAT ==========
        const CHAT_BIN_ID = '69c795a8aa77b81da92aeecf';

        // Âm thanh thông báo bằng Web Audio API
        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                // Nốt 1
                const o1 = ctx.createOscillator();
                const g1 = ctx.createGain();
                o1.type = 'sine';
                o1.frequency.value = 830;
                g1.gain.setValueAtTime(0.3, ctx.currentTime);
                g1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                o1.connect(g1);
                g1.connect(ctx.destination);
                o1.start(ctx.currentTime);
                o1.stop(ctx.currentTime + 0.3);

                // Nốt 2 (cao hơn, tạo hiệu ứng "ting ting")
                const o2 = ctx.createOscillator();
                const g2 = ctx.createGain();
                o2.type = 'sine';
                o2.frequency.value = 1100;
                g2.gain.setValueAtTime(0.25, ctx.currentTime + 0.15);
                g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                o2.connect(g2);
                g2.connect(ctx.destination);
                o2.start(ctx.currentTime + 0.15);
                o2.stop(ctx.currentTime + 0.45);
            } catch (e) {
                // Trình duyệt không hỗ trợ
            }
        }
        let chatMessages = [];
        let chatUser = localStorage.getItem('chat-username') || '';
        let chatOpen = false;
        let lastMsgCount = 0;

        function toggleChat() {
            chatOpen = !chatOpen;
            document.getElementById('chat-panel').classList.toggle('open', chatOpen);
            if (chatOpen) {
                document.getElementById('chat-badge').classList.remove('visible');
                renderChat();
                loadChat();
            }
        }

        function renderChat() {
            const body = document.getElementById('chat-body');
            if (!chatUser) {
                body.innerHTML = `
                    <div class="chat-name-prompt">
                        <p>Nhập tên của bạn để bắt đầu nhắn tin</p>
                        <input type="text" id="chat-name-input" placeholder="Tên của bạn..." maxlength="20">
                        <br>
                        <button onclick="setChatName()">Vào chat</button>
                    </div>`;
                setTimeout(() => {
                    const inp = document.getElementById('chat-name-input');
                    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') setChatName(); });
                }, 50);
                return;
            }

            let msgsHtml = '';
            if (chatMessages.length === 0) {
                msgsHtml = '<div class="chat-empty">Chưa có tin nhắn nào</div>';
            } else {
                msgsHtml = chatMessages.map(m => {
                    const isMine = m.author === chatUser;
                    const time = new Date(m.time).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                    return `<div class="chat-msg-wrapper ${isMine ? 'mine' : 'other'}">
                        <div class="msg-author">${escapeHtml(m.author)}</div>
                        <div class="chat-bubble">
                            <div>${escapeHtml(m.text)}</div>
                            <div class="msg-time">${time}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            body.innerHTML = `
                <div class="chat-messages" id="chat-messages">${msgsHtml}</div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." maxlength="500">
                    <button class="chat-send-btn" onclick="sendMessage()">&#10148;</button>
                </div>`;

            const msgContainer = document.getElementById('chat-messages');
            msgContainer.scrollTop = msgContainer.scrollHeight;

            setTimeout(() => {
                const inp = document.getElementById('chat-input');
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
            }, 50);
        }

        function setChatName() {
            const inp = document.getElementById('chat-name-input');
            const name = inp ? inp.value.trim() : '';
            if (!name) return;
            chatUser = name;
            localStorage.setItem('chat-username', chatUser);
            renderChat();
            loadChat();
        }

        let lastChatHash = '';
        async function loadChat() {
            try {
                const res = await fetch(`${API_URL}/${CHAT_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_KEY }
                });
                const data = await res.json();
                const record = data.record;
                const newMessages = record && record.messages ? record.messages : [];
                if (newMessages.length > 100) newMessages.splice(0, newMessages.length - 100);
                const newHash = JSON.stringify(newMessages);

                if (newHash === lastChatHash) return; // Không thay đổi, bỏ qua

                const hadNewMessages = newMessages.length > lastMsgCount && lastMsgCount > 0;
                chatMessages = newMessages;
                lastChatHash = newHash;

                if (hadNewMessages) {
                    playNotificationSound();
                    if (!chatOpen) {
                        const badge = document.getElementById('chat-badge');
                        badge.textContent = chatMessages.length - lastMsgCount;
                        badge.classList.add('visible');
                    }
                }
                lastMsgCount = chatMessages.length;

                if (chatOpen) renderChat();
            } catch (err) {
                // Lỗi tải chat
            }
        }

        async function sendMessage() {
            const inp = document.getElementById('chat-input');
            const text = inp ? inp.value.trim() : '';
            if (!text) return;

            chatMessages.push({
                author: chatUser,
                text: text,
                time: Date.now()
            });

            inp.value = '';
            lastMsgCount = chatMessages.length;
            lastChatHash = JSON.stringify(chatMessages);
            renderChat();

            try {
                await fetch(`${API_URL}/${CHAT_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify({ messages: chatMessages })
                });
                lastMsgCount = chatMessages.length;
            } catch (err) {
                // Lỗi gửi tin nhắn
            }
        }

        // Tải tin nhắn mỗi 10 giây
        setInterval(() => { if (chatUser) loadChat(); }, 10000);

        // Khởi chạy
        initBin();
        if (chatUser) loadChat();
    </script>
</body>
</html>
